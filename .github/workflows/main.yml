name: Build SAMP APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8' # Mudança crucial para sources SAMP antigas
          distribution: 'temurin'
          cache: gradle

      - name: Permissão no Gradle
        run: chmod +x gradlew

      - name: Compilar APK
        # Adicionado --no-daemon para evitar erros de cache no GitHub Actions
        run: ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: samp-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
