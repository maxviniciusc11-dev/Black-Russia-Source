name: Build SAMP APK

on:
  push:
    branches: [ "main" ] # Mude para a sua branch principal
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout da Source
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permissão ao Gradle
        run: chmod +x gradlew

      - name: Compilar APK (Debug)
        run: ./gradlew assembleDebug

      - name: Upload do APK Gerado
        uses: actions/upload-artifact@v4
        with:
          name: samp-debug-apk
          path: app/build/outputs/apk/debug/*.apk
