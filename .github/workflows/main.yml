name: Build SAMP APK

on:
  push:
    branches: [ "main", "master" ] # Adicionei master por segurança
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11' # Mudamos de 17 para 11
          distribution: 'temurin'
          cache: gradle

      - name: Permissão no Gradle
        run: chmod +x gradlew

      - name: Compilar APK
        # O 'clean' limpa lixos de builds anteriores e o '--stacktrace' mostra o erro real se falhar
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: samp-debug-apk
          path: "**/build/outputs/apk/debug/*.apk" # Busca em qualquer subpasta
